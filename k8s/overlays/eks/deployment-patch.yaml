apiVersion: apps/v1
kind: Deployment
metadata:
  name: rind
  namespace: rind-system
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: rind
          imagePullPolicy: Always
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
