apiVersion: v1
kind: Service
metadata:
  name: rind-api
  namespace: rind-system
spec:
  type: NodePort
  ports:
    - name: api
      port: 80
      targetPort: 8080
      protocol: TCP
      nodePort: 30080
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
      nodePort: 30090
