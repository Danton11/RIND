apiVersion: apps/v1
kind: Deployment
metadata:
  name: rind-canary
  namespace: rind-system
  labels:
    app.kubernetes.io/name: rind-canary
    app.kubernetes.io/component: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rind-canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rind-canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: canary
          image: python:3.11-slim
          # `pip install` writes to site-packages, so readOnlyRootFilesystem
          # would break this without a writable overlay. Sidecar isn't on the
          # DNS data path; capability drop + no-privilege-escalation is enough.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet requests &&
              python3 /scripts/dns-canary.py \
                --dns-server=rind-dns.rind-system.svc.cluster.local \
                --dns-port=53 \
                --api-server=rind-api.rind-system.svc.cluster.local \
                --api-port=80 \
                --metrics-port=8090
          ports:
            - containerPort: 8090
              protocol: TCP
              name: metrics
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "192Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: rind-canary-script
---
apiVersion: v1
kind: Service
metadata:
  name: rind-canary
  namespace: rind-system
  labels:
    app.kubernetes.io/name: rind-canary
    app.kubernetes.io/component: canary
spec:
  selector:
    app.kubernetes.io/name: rind-canary
  ports:
    - name: metrics
      port: 8090
      targetPort: 8090
      protocol: TCP
