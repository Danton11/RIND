apiVersion: v1
kind: Service
metadata:
  name: rind-api
  namespace: rind-system
  labels:
    app.kubernetes.io/name: rind
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: rind
  ports:
    - name: api
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
