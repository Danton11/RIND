apiVersion: apps/v1
kind: Deployment
metadata:
  name: rind
  namespace: rind-system
  labels:
    app.kubernetes.io/name: rind
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rind
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rind
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rind-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rind
          image: rind:k8s
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 12312
              protocol: UDP
              name: dns
            - containerPort: 8080
              protocol: TCP
              name: api
            - containerPort: 9090
              protocol: TCP
              name: metrics
          envFrom:
            - configMapRef:
                name: rind-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
